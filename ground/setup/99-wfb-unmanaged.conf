# Install to: /etc/NetworkManager/conf.d/99-wfb-unmanaged.conf  then: nmcli general reload
#
# Keep the RTL88x2 monitor-mode adapters away from NetworkManager + its
# wpa_supplicant so gs_supervisor's monitor bring-up is deterministic.
#
# Without this, the adapters are NM-managed and the supervisor's old
# `nmcli device set <iface> managed no` up-step raced NM: the release is
# asynchronous, so right after `ip link set <iface> up` NM could re-grab the
# radio, revert it from monitor back to managed, and hold it busy — making
# `iw set channel` fail with -16 and that adapter come up wrong. With two
# identical adapters toggled back-to-back it failed intermittently (~50%).
#
# Pinning them unmanaged here removes the race entirely, so the host_x86.json
# up-path no longer needs (and no longer contains) any nmcli toggling.
#
# Replace the MACs with your adapters' (see: ip -br link | grep wlx).
[keyfile]
unmanaged-devices=mac:40:a5:ef:2f:22:9b;mac:40:a5:ef:2f:23:08
